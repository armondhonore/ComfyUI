application:
  name: comfyui
  pods:
  - name: app
    image: yanwk/comfyui-boot:latest
    path: /
    servicePorts:
    - 8188
    vars:
      CLI_ARGS: ""
    volumes:
    - name: comfyui-root
      mountPath: /root
      size: 5Gi
    - name: comfyui-runner
      mountPath: /home/runner
      size: 5Gi
